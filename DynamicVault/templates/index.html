<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vault Server</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

body{
background:#0a0d16;
color:#cfd8ff;
font-family:'IBM Plex Mono',monospace;
margin:0;
}

.topbar{
display:flex;
align-items:center;
padding:15px 30px;
border-bottom:1px solid #1d233b;
}

.logo{
font-family:'Bebas Neue',sans-serif;
font-size:26px;
letter-spacing:3px;
}

.container{
padding:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.stat{
background:#11152a;
padding:15px;
border-radius:8px;
border:1px solid #1c2140;
text-align:center;
}

.stat .value{
font-size:28px;
color:#00e5ff;
}

.nodes{
background:#11152a;
border:1px solid #1c2140;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

.node-grid{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.node{
width:60px;
height:60px;
border-radius:6px;
background:#1c2140;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:12px;
}

.node.joined{background:#2a335f;}
.node.verified{background:#1b5e3c;}
.node.submitted{background:#0d47a1;}

.progress{
margin-top:20px;
}

.bar{
height:6px;
background:#1c2140;
border-radius:20px;
overflow:hidden;
}

.fill{
height:6px;
background:#00e5ff;
width:0%;
}

.secret-box{
margin-top:20px;
background:#11152a;
border:1px solid #1c2140;
padding:20px;
border-radius:8px;
display:none;
}

.log{
background:#0e1222;
height:200px;
overflow:auto;
padding:10px;
border-top:1px solid #1c2140;
font-size:12px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">VAULT SERVER</div>
</div>

<div class="container">

<div class="stats">

<div class="stat">
<div class="value" id="stat-n">0</div>
<div>Participants</div>
</div>

<div class="stat">
<div class="value" id="stat-t">0</div>
<div>Threshold</div>
</div>

<div class="stat">
<div class="value" id="stat-joined">0</div>
<div>Joined</div>
</div>

<div class="stat">
<div class="value" id="stat-submitted">0</div>
<div>Submitted</div>
</div>

</div>

<div class="nodes">

<h3>Participants</h3>

<div class="node-grid" id="node-grid"></div>

<div class="progress">
<div class="bar">
<div class="fill" id="progress-fill"></div>
</div>
</div>

</div>

<div class="secret-box" id="secret-box">

<h3>Secret Reconstructed</h3>
<div id="secret-value"></div>

</div>

</div>

<div class="log" id="log"></div>

<script>

function log(msg){
const box=document.getElementById("log")
box.innerHTML += msg+"<br>"
box.scrollTop=box.scrollHeight
}

function addNode(id){

const grid=document.getElementById("node-grid")

const div=document.createElement("div")
div.className="node joined"
div.id="node-"+id

div.innerHTML=id

grid.appendChild(div)

}

function markSubmitted(id){

const node=document.getElementById("node-"+id)
if(node) node.className="node submitted"

}

function updateProgress(count,needed){

const pct=(count/needed)*100
document.getElementById("progress-fill").style.width=pct+"%"

}

function showSecret(secret){

document.getElementById("secret-box").style.display="block"
document.getElementById("secret-value").innerText=secret

}

</script>

</body>
</html>
